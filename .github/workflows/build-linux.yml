name: Build Linux
on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - 'master'
    tags:
      - '*'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      MODE: release
      TARGET_OS: linux
      ARCH: ${{ matrix.arch }}
      TARGET_CPUREV: ${{ matrix.cpurev }}
      JOBS: 4
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04]
        arch: [amd64, i386, arm64, armhf]
        cpurev: [legacy, default, modern]
    steps:

    # Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # Purge PPA
    - name: Purge PPA
      run: |
        sudo apt-get update
        sudo apt-get install -y ppa-purge aptitude
        sudo ppa-purge -y ppa:ubuntu-toolchain-r/test

    # Cross-Compile Support
    - name: Cross-Compile Support
      uses: cyberjunk/gha-ubuntu-cross@v4
      if: matrix.arch != 'amd64'
      with:
        arch: ${{ matrix.arch }}

    # Ubuntu Packages
    - name: Ubuntu Packages
      run: sudo apt-get install llvm libx11-dev:$ARCH
    
    # CLANG15
    - name: CLANG15
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo bash select-clang.sh 13 101
        update-alternatives --display clang++
        update-alternatives --display clang
        sudo update-alternatives --auto clang
        sudo update-alternatives --auto clang++
        clang --version
        clang++ --version

    - name: CLANG17
      if: matrix.os == 'ubuntu-22.04'
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo 'deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main' | sudo tee -a /etc/apt/sources.list.d/llvm.list
        echo 'deb-src http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main' | sudo tee -a /etc/apt/sources.list.d/llvm.list
        sudo apt-get update
        sudo apt-get install llvm-17 clang-17 lld-17
        sudo bash select-clang.sh 17 102
        update-alternatives --display clang++
        update-alternatives --display clang
        sudo update-alternatives --auto clang
        sudo update-alternatives --auto clang++
        clang --version
        clang++ --version
        
    #- name: Install LLVM and Clang
    #  uses: KyleMayes/install-llvm-action@v2
    #  with:
    #    version: "11.0"

    # QEMU (ARM64/ARMHF)
    - name: QEMU (ARM64/ARMHF)
      if: matrix.arch == 'arm64' || matrix.arch == 'armhf' || matrix.arch == 'armel' 
      run: sudo apt-get install qemu-user qemu-user-static

    # Set Environment Vars
    - name: Set Environment Vars
      run: |
        if [ $ARCH == amd64 ]; then \
          echo "TARGET_ARCH=x64" >> $GITHUB_ENV; \
          echo "TARGET=x86_64-linux-gnu" >> $GITHUB_ENV; \
        fi
        if [ $ARCH == i386 ]; then \
          echo "TARGET_ARCH=x86" >> $GITHUB_ENV; \
          echo "TARGET=i686-linux-gnu" >> $GITHUB_ENV; \
        fi
        if [ $ARCH == arm64 ]; then \
          echo "TARGET_ARCH=arm64" >> $GITHUB_ENV; \
          echo "TARGET=aarch64-linux-gnu" >> $GITHUB_ENV; \
        fi
        if [ $ARCH == armhf ]; then \
          echo "TARGET_ARCH=arm" >> $GITHUB_ENV; \
          echo "TARGET=arm-linux-gnueabihf" >> $GITHUB_ENV; \
        fi

    # Clang Version
    - name: Clang Version
      run: clang --version

    # Build
    - name: Build
      run: |
        echo MODE: $MODE
        echo ARCH: $ARCH
        echo TARGET: $TARGET
        echo TARGET_ARCH: $TARGET_ARCH
        echo TARGET_CPUREV: $TARGET_CPUREV
        clang++ --target=$TARGET -v
        make -v
        make -j${{ env.JOBS }}

    # Binary Info
    - name: Binary Info
      if: matrix.arch == 'amd64' || matrix.arch == 'i386'
      run: |
        echo CppCore.Example.Server
        ldd ./build/make/bin/linux-${{ env.TARGET_ARCH }}/CppCore.Example.Server
        echo CppCore.Example.Client
        ldd ./build/make/bin/linux-${{ env.TARGET_ARCH }}/CppCore.Example.Client
        echo CppCore.Example.UI
        ldd ./build/make/bin/linux-${{ env.TARGET_ARCH }}/CppCore.Example.UI
        echo CppCore.Test
        ldd ./build/make/bin/linux-${{ env.TARGET_ARCH }}/CppCore.Test
        echo CppCore.Debug
        ldd ./build/make/bin/linux-${{ env.TARGET_ARCH }}/CppCore.Debug
        echo CppCore.Interface.C
        ldd ./build/make/lib/linux-${{ env.TARGET_ARCH }}/libcppcore.so

    # Debug
    - name: Debug
      run: ./build/make/bin/linux-${{ env.TARGET_ARCH }}/CppCore.Debug

    # Test Native
    - name: Test Native
      run: make test

    # Make (dist)
    - name: Make (dist)
      run: make dist -j${{ env.JOBS }}

    # Install Python
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    # Make (dist-python)
    - name: Make (dist-python)
      run: |
        python --version
        python -m pip install build
        make CppCore.Interface.Python
    
    # Test Python
    - name: Test Python
      if: matrix.arch == 'amd64'
      run: |
        cd src/CppCore.Interface.Python
        python -m pip install pytest crc32c pbkdf2-reboot
        pytest
    
    # Upload Packages
    - name: Upload Packages
      uses: actions/upload-artifact@v4
      with:
        name: Packages (${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.cpurev }})
        path: |
          ./dist/${{ matrix.os }}/*.deb
          ./dist/${{ matrix.os }}/*.whl

    # Upload to Github Release
    - name: Upload to Github Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/') && (matrix.cpurev == 'default')
      with:
        token: ${{ secrets.PAT_GITHUB_ACTIONS }}
        files: ./dist/${{ matrix.os }}/*.deb
